version: '3.8'
services:
  mongo:
    image: mongo
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "3008:3008"
    depends_on:
      - mongo
  task-service:
    build: ./task-service
    container_name: task-service
    ports:
      - "3007:3007"
    depends_on:
      - mongo
      - rabbitmq
  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "3009:3009"
    depends_on:
      - mongo
      - rabbitmq
volumes:
  mongo_data: